<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Londonsky | AI Visa and Travel Automation</title>
  <meta name="description" content="Contact Londonsky for AI visa processing, travel automation, agency portals, and cloud-based travel operations.">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="contact-page">
  <main class="minimal-contact">
    <a class="contact-logo" href="index.html" aria-label="Back to Londonsky home">
      <img src="logo.svg" alt="Londonsky">
    </a>

    <section class="contact-card" aria-labelledby="contact-title">
      <p class="eyebrow">Contact</p>
      <h1 id="contact-title">Speak with Londonsky</h1>
      <p>Email: <a href="mailto:info@londonsky.org">info@londonsky.org</a></p>

      <form class="contact-form minimal-form" action="mailto:info@londonsky.org" method="post" enctype="text/plain">
        <label>
          Name
          <input type="text" name="name" placeholder="Your name" required>
        </label>
        <label>
          Email
          <input type="email" name="email" placeholder="name@example.com" required>
        </label>
        <label>
          Organization
          <input type="text" name="organization" placeholder="Company or agency">
        </label>
        <label>
          Use case
          <select name="use-case">
            <option>Visa processing</option>
            <option>Travel agency automation</option>
            <option>Corporate mobility</option>
            <option>Student travel</option>
            <option>White-label partner portal</option>
          </select>
        </label>
        <label class="full">
          Message
          <textarea name="message" rows="5" placeholder="Tell us what you want to automate." required></textarea>
        </label>
        <button class="button button-primary" type="submit">Send request</button>
      </form>
    </section>
  </main>
</body>
</html>
